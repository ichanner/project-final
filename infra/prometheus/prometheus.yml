global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: scraper
    static_configs:
      - targets: ["scraper:8080"]

  - job_name: extracto
    static_configs:
      - targets: ["extracto:8081"]

  - job_name: heuristic
    static_configs:
      - targets: ["heuristic:8082"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
