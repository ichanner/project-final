apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Postgres for direct SQL panels
  - name: Postgres
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: webharvest
    database: webharvest
    secureJsonData:
      password: webharvest
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
