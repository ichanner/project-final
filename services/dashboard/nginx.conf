server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to scraper service.
  location /api/ {
    proxy_pass http://scraper:8080/;
    proxy_set_header Host $host;
  }

  # Optional convenience links to Grafana / Prometheus.
  location /grafana/ {
    proxy_pass http://grafana:3000/;
    proxy_set_header Host $host;
  }
  location /prometheus/ {
    proxy_pass http://prometheus:9090/;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}
