name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: docker compose up + end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the stack with test overlay
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            up -d --build --wait
        env:
          DOCKER_BUILDKIT: 1
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Print service status
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml ps

      - name: Run integration test
        run: bash tests/integration/run.sh
        env:
          SCRAPER_URL: http://localhost:8080
          FIXTURE_URL: http://fixture/jsonld.html

      - name: Dump logs on failure
        if: failure()
        run: |
          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.test.yml"
          echo "::group::scraper"   && $COMPOSE logs scraper   && echo "::endgroup::"
          echo "::group::worker"    && $COMPOSE logs worker    && echo "::endgroup::"
          echo "::group::extracto"  && $COMPOSE logs extracto  && echo "::endgroup::"
          echo "::group::postgres"  && $COMPOSE logs postgres  && echo "::endgroup::"
          echo "::group::fixture"   && $COMPOSE logs fixture   && echo "::endgroup::"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
