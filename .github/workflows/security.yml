name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [scraper, heuristic]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r services/${{ matrix.service }}/requirements.txt --strict

  npm-audit:
    name: npm audit (Node deps)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [extracto, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: services/${{ matrix.service }}
        run: npm install --no-audit --no-fund --package-lock-only
      - name: Audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=high

  trivy-images:
    name: Trivy (container images)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service: [scraper, extracto, heuristic, dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t webharvest-${{ matrix.service }}:ci services/${{ matrix.service }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: webharvest-${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: webharvest-${{ matrix.service }}:ci
          format: cyclonedx
          output: sbom-${{ matrix.service }}.cdx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json
          retention-days: 30

  trivy-fs:
    name: Trivy (repo filesystem)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  secret-scan:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
