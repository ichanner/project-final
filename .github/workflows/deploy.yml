name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (defaults to short SHA)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [scraper, extracto, local-model, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/web-harvest-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

  release-notes:
    name: Release notes
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Images

            All four service images have been pushed to GHCR with this tag:

            - `ghcr.io/${{ github.repository_owner }}/web-harvest-scraper:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/web-harvest-extracto:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/web-harvest-local-model:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/web-harvest-dashboard:${{ github.ref_name }}`

            Each image carries a SLSA provenance attestation and SBOM (visible under "Verified" in the GHCR UI).
