name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scraper:
    name: Scraper (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  local-model:
    name: Local model (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/local-model
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  extracto:
    name: Extracto (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/extracto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/extracto/package.json
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npx eslint src tests
      - name: Test
        run: npm test
        env:
          ANTHROPIC_API_KEY: dummy-for-tests

  dashboard:
    name: Dashboard (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/dashboard/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run build

  compose-build:
    name: docker compose build
    runs-on: ubuntu-latest
    needs: [scraper, local-model, extracto, dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
